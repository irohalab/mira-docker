    environment:
      APPCONFIG: /etc/mira/config.yml
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_NAME: ${ALBIREO_DB_NAME:-albireo}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      NODE_ENV: 'production'
    volumes:
      - ${STREAMING_PLATFORM_CONFIG_PATH:-./streaming_platform}/config.yml:/etc/mira/config.yml:ro
      - ${DOWNLOAD_DATA:-/data/albireo}:/data/albireo:rw
    command: 'node dist/tools.js --clientMapping'
    networks:
      - mira

  streaming-platform-update-bgm:
