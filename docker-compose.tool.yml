      - ${STREAMING_PLATFORM_CONFIG_PATH:-./streaming_platform}/cleanup:/etc/mira/cleanup:rw
    command: 'node dist/tools.js --exportCleanup /etc/mira/cleanup/episode-cleanup.json'
