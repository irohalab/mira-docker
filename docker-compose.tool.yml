      - ${STREAMING_PLATFORM_CONFIG_PATH:-./streaming_platform}/cleanup:/etc/mira/cleanup:rw
    command: 'node dist/tools.js --forceUpdate /etc/mira/cleanup/episode-cleanup.json'
    networks:
      - mira

  streaming-platform-scan-orphan-files:
    image: 'ghcr.io/irohalab/mira-streaming-platform:${STREAMING_PLATFORM_TAG}'
    container_name: 'streaming-platform-force-update'
    profiles: [ 'streaming_platform_scan_orphan_files' ]
